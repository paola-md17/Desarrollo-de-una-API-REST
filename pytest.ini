[pytest]
# Directorio donde están tus pruebas
testpaths = tests

# Patrones para encontrar archivos, clases y funciones de prueba
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ayuda a resolver el error de "ModuleNotFoundError: No module named 'app'"
pythonpath = .

# Opciones por defecto al ejecutar pytest
addopts =
    -v
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=80

# Ignorar advertencias molestas de librerías externas 
filterwarnings =
    ignore::DeprecationWarning